<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem BaiNet - Portal Reseller</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --bg: #f8f9fa; --text: #3c4043; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 15px; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); height: fit-content; margin-top: 20px; }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { color: var(--primary); font-size: 24px; margin-bottom: 4px; }
        .header p { color: #70757a; font-size: 14px; }
        
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; color: #5f6368; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #dadce0; font-size: 16px; outline: none; }
        input:focus { border-color: var(--primary); box-shadow: 0 0 0 2px rgba(26,115,232,0.2); }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: background 0.2s; margin-top: 10px; }
        button:active { transform: scale(0.98); }
        button:disabled { background: #bdc1c6; cursor: not-allowed; }
        
        .hidden { display: none; }
        
        .stats { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-item { flex: 1; background: #f1f3f4; padding: 12px; border-radius: 12px; text-align: center; border: 1px solid #e8eaed; }
        .stat-item small { color: #5f6368; font-size: 12px; display: block; margin-bottom: 4px; }
        .stat-item b { color: var(--primary); font-size: 20px; display: block; }
        
        #reader { width: 100%; margin-top: 15px; border-radius: 12px; overflow: hidden; border: 2px solid #e8eaed; background: #000; }
        .error-msg { color: #d93025; text-align: center; font-size: 13px; margin-top: 10px; display: block; }
        .logout-btn { background: #f1f3f4; color: #5f6368; margin-top: 25px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Sistem BaiNet</h1>
        <p id="subStatus">Silakan login untuk melapor penjualan</p>
    </div>

    <!-- HALAMAN LOGIN -->
    <div id="loginPage">
        <label>Nama Reseller:</label>
        <input type="text" id="resellerName" placeholder="Contoh: Mastin" autocomplete="off">
        <label>Password (4 Digit):</label>
        <input type="password" id="passInput" maxlength="4" inputmode="numeric" placeholder="****">
        <button onclick="prosesLogin()">MASUK KE PANEL</button>
        <span id="err" class="error-msg"></span>
    </div>

    <!-- HALAMAN DASHBOARD -->
    <div id="dashboardPage" class="hidden">
        <div class="stats">
            <div class="stat-item">
                <small>Sisa Stok</small>
                <b id="stokVal">0</b>
            </div>
            <div class="stat-item">
                <small>Voucher Terjual</small>
                <b id="terjualVal">0</b>
            </div>
        </div>
        
        <label>Input/Scan Kode Voucher:</label>
        <input type="text" id="voucherCode" placeholder="Masukkan kode atau klik scan...">
        
        <button id="btnKirim" onclick="submitKeGoogle()">KIRIM LAPORAN</button>
        <button style="background: var(--success);" onclick="mulaiScan()">📷 BUKA KAMERA SCAN</button>
        
        <div id="reader" class="hidden"></div>
        
        <button class="logout-btn" onclick="location.reload()">KELUAR APLIKASI</button>
    </div>
</div>

<script>
    // URL Google Apps Script terbaru Anda
    const scriptURL = "https://script.google.com/macros/s/AKfycbzeFbvWS9j6dEhSZV6UVD59bHBElWhGTbOfSI4FgQNhjIozV00o1alQrfo9Ln-ZfY2DlQ/exec";

    // Database Reseller Lokal (Saldo dihapus, diganti total terjual: t)
    const db = {
        "Mastin": { p: "1111", s: 50, t: 0 },
        "Yesi": { p: "2222", s: 30, t: 0 }, 
        "Qila": { p: "3333", s: 100, t: 0 },
        "Santy": { p: "4444", s: 25, t: 0 },
        "Upi": { p: "5555", s: 40, t: 0 },  
        "Tity": { p: "6666", s: 60, t: 0 }  
    };

    let userSekarang = "";

    function prosesLogin() {
        const n = document.getElementById('resellerName').value.trim();
        const p = document.getElementById('passInput').value;
        
        // Pencarian nama (tidak sensitif huruf besar/kecil)
        const namaKey = Object.keys(db).find(k => k.toLowerCase() === n.toLowerCase());

        if (namaKey && db[namaKey].p === p) {
            userSekarang = namaKey;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('subStatus').innerText = "Reseller: " + namaKey;
            document.getElementById('stokVal').innerText = db[namaKey].s;
            document.getElementById('terjualVal').innerText = db[namaKey].t;
        } else {
            document.getElementById('err').innerText = "Nama atau Password salah. Silakan coba lagi.";
        }
    }

    function submitKeGoogle() {
        const kode = document.getElementById('voucherCode').value.trim();
        const btn = document.getElementById('btnKirim');
        
        if(!kode) return alert("Harap isi atau scan kode voucher terlebih dahulu!");

        btn.disabled = true;
        btn.innerText = "Sedang Mengirim...";

        // Menyiapkan data untuk dikirim ke doPost Apps Script
        const formData = new FormData();
        formData.append("nama", userSekarang);
        formData.append("kode", kode);

        fetch(scriptURL, {
            method: 'POST',
            body: formData,
            mode: 'no-cors' // Mode aman untuk Google Apps Script di browser mobile
        })
        .then(() => {
            // Karena no-cors, kita anggap sukses jika request terkirim
            db[userSekarang].s--; // Stok berkurang lokal
            db[userSekarang].t++; // Total terjual bertambah lokal
            
            document.getElementById('stokVal').innerText = db[userSekarang].s;
            document.getElementById('terjualVal').innerText = db[userSekarang].t;
            document.getElementById('voucherCode').value = "";
            
            btn.disabled = false;
            btn.innerText = "KIRIM LAPORAN";
            alert("Laporan Berhasil! Data sudah tercatat di Google Sheets.");
        })
        .catch(e => {
            console.error("Error:", e);
            alert("Gagal mengirim laporan. Periksa koneksi internet Anda.");
            btn.disabled = false;
            btn.innerText = "KIRIM LAPORAN";
        });
    }

    function mulaiScan() {
        const r = document.getElementById('reader');
        r.classList.remove('hidden');
        const scanner = new Html5Qrcode("reader");
        
        const config = { fps: 10, qrbox: { width: 250, height: 250 } };

        scanner.start({ facingMode: "environment" }, config, 
            hasil => {
                document.getElementById('voucherCode').value = hasil;
                scanner.stop().then(() => {
                    r.classList.add('hidden');
                    // Langsung kirim otomatis setelah scan berhasil
                    submitKeGoogle();
                });
            }
        ).catch(err => {
            alert("Kamera tidak dapat diakses. Pastikan izin kamera aktif dan menggunakan link HTTPS.");
            r.classList.add('hidden');
        });
    }
</script>

</body>
</html>
