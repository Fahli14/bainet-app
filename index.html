<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem BaiNet - Portal Reseller</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --bg: #f8f9fa; --text: #3c4043; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); color: var(--text); display: flex; justify-content: center; min-height: 100vh; padding: 15px; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 16px; padding: 24px; box-shadow: 0 4px 20px rgba(0,0,0,0.08); height: fit-content; margin-top: 20px; }
        .header { text-align: center; margin-bottom: 24px; }
        .header h1 { color: var(--primary); font-size: 24px; margin-bottom: 4px; }
        
        label { display: block; margin-top: 15px; font-weight: 600; font-size: 14px; color: #5f6368; }
        input, button { width: 100%; padding: 12px; margin: 8px 0; border-radius: 10px; border: 1px solid #dadce0; font-size: 16px; outline: none; }
        
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.2s; }
        button:disabled { background: #bdc1c6; }
        
        .hidden { display: none; }
        
        .stats { display: flex; gap: 12px; margin-bottom: 20px; }
        .stat-item { flex: 1; background: #f1f3f4; padding: 12px; border-radius: 12px; text-align: center; }
        .stat-item b { color: var(--primary); font-size: 20px; display: block; }
        
        .history-container { margin-top: 25px; border-top: 2px solid #f1f3f4; padding-top: 15px; }
        .history-title { font-size: 14px; font-weight: bold; margin-bottom: 10px; color: #5f6368; display: flex; justify-content: space-between; }
        .history-list { list-style: none; max-height: 250px; overflow-y: auto; }
        .history-item { background: #fff; border: 1px solid #eee; padding: 10px; border-radius: 8px; margin-bottom: 5px; display: flex; justify-content: space-between; font-size: 13px; align-items: center; }
        .history-item span { color: #888; font-size: 11px; }

        #reader { width: 100%; margin-top: 15px; border-radius: 12px; overflow: hidden; background: #000; }
        .logout-btn { background: #f1f3f4; color: #5f6368; margin-top: 20px; font-size: 14px; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Sistem BaiNet</h1>
        <p id="subStatus">Lapor Penjualan Voucher</p>
    </div>

    <!-- HALAMAN LOGIN -->
    <div id="loginPage">
        <label>Nama Reseller:</label>
        <input type="text" id="resellerName" placeholder="Nama Anda">
        <label>Password:</label>
        <input type="password" id="passInput" maxlength="4" inputmode="numeric">
        <button onclick="prosesLogin()">MASUK</button>
        <p id="err" style="color:red; text-align:center; font-size:12px; margin-top:10px;"></p>
    </div>

    <!-- HALAMAN DASHBOARD -->
    <div id="dashboardPage" class="hidden">
        <div class="stats">
            <div class="stat-item"><small>Sisa Stok</small><b id="stokVal">0</b></div>
            <div class="stat-item"><small>Total Terjual</small><b id="terjualVal">0</b></div>
        </div>
        
        <input type="text" id="voucherCode" placeholder="Kode Voucher">
        <button id="btnKirim" onclick="submitKeGoogle()">KIRIM LAPORAN</button>
        <button style="background: var(--success);" onclick="mulaiScan()">📷 SCAN BARCODE</button>
        
        <div id="reader" class="hidden"></div>

        <div class="history-container">
            <div class="history-title">
                <span>Riwayat Voucher (Hari Ini)</span>
                <span id="countHist">0</span>
            </div>
            <div id="historyList" class="history-list">
                <p id="emptyMsg" style="text-align:center; color:#ccc; font-size:12px; margin-top:10px;">Belum ada penjualan</p>
            </div>
        </div>
        
        <button class="logout-btn" onclick="tombolKeluar()">KELUAR & BERSIHKAN</button>
    </div>
</div>

<script>
    const scriptURL = "https://script.google.com/macros/s/AKfycbzeFbvWS9j6dEhSZV6UVD59bHBElWhGTbOfSI4FgQNhjIozV00o1alQrfo9Ln-ZfY2DlQ/exec";

    const db = {
        "Mastin": { p: "1111", s: 50 },
        "Yesi": { p: "2222", s: 30 }, 
        "Qila": { p: "3333", s: 100 },
        "Santy": { p: "4444", s: 25 },
        "Upi": { p: "5555", s: 40 },  
        "Tity": { p: "6666", s: 60 }  
    };

    let userSekarang = "";
    let riwayatVoucher = [];

    function prosesLogin() {
        const n = document.getElementById('resellerName').value.trim();
        const p = document.getElementById('passInput').value;
        const namaKey = Object.keys(db).find(k => k.toLowerCase() === n.toLowerCase());

        if (namaKey && db[namaKey].p === p) {
            userSekarang = namaKey;
            
            // Muat data dari penyimpanan HP
            loadDataLocal();
            
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('subStatus').innerText = "Halo, " + namaKey;
            
            updateDisplay();
        } else {
            document.getElementById('err').innerText = "Nama atau Password Salah!";
        }
    }

    function updateDisplay() {
        // Stok dikurangi jumlah yang sudah terjual di riwayat
        const terjual = riwayatVoucher.length;
        document.getElementById('stokVal').innerText = db[userSekarang].s - terjual;
        document.getElementById('terjualVal').innerText = terjual;
        document.getElementById('countHist').innerText = terjual;
        
        const list = document.getElementById('historyList');
        const emptyMsg = document.getElementById('emptyMsg');
        
        if (terjual > 0) {
            if(emptyMsg) emptyMsg.remove();
            list.innerHTML = "";
            riwayatVoucher.slice().reverse().forEach(item => {
                const div = document.createElement('div');
                div.className = 'history-item';
                div.innerHTML = `<b>${item.kode}</b> <span>${item.jam}</span>`;
                list.appendChild(div);
            });
        }
    }

    function loadDataLocal() {
        const saved = localStorage.getItem('bainet_' + userSekarang);
        if (saved) {
            riwayatVoucher = JSON.parse(saved);
        } else {
            riwayatVoucher = [];
        }
    }

    function saveDataLocal() {
        localStorage.setItem('bainet_' + userSekarang, JSON.stringify(riwayatVoucher));
    }

    function tombolKeluar() {
        if(confirm("Keluar dan hapus riwayat tampilan? (Data di Google Sheets tetap aman)")) {
            localStorage.removeItem('bainet_' + userSekarang);
            location.reload();
        }
    }

    function submitKeGoogle() {
        const kode = document.getElementById('voucherCode').value.trim();
        const btn = document.getElementById('btnKirim');
        if(!kode) return alert("Isi kode dulu!");

        btn.disabled = true;
        btn.innerText = "Mengirim...";

        const formData = new FormData();
        formData.append("nama", userSekarang);
        formData.append("kode", kode);

        fetch(scriptURL, { method: 'POST', body: formData, mode: 'no-cors' })
        .then(() => {
            const waktu = new Date().toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' });
            
            // Simpan ke array riwayat
            riwayatVoucher.push({ kode: kode, jam: waktu });
            
            // Simpan ke memory HP
            saveDataLocal();
            
            // Update Tampilan
            updateDisplay();
            
            document.getElementById('voucherCode').value = "";
            btn.disabled = false;
            btn.innerText = "KIRIM LAPORAN";
        })
        .catch(e => {
            alert("Gagal Kirim! Cek koneksi.");
            btn.disabled = false;
            btn.innerText = "KIRIM LAPORAN";
        });
    }

    function mulaiScan() {
        const r = document.getElementById('reader');
        r.classList.remove('hidden');
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            hasil => {
                document.getElementById('voucherCode').value = hasil;
                scanner.stop().then(() => {
                    r.classList.add('hidden');
                    submitKeGoogle();
                });
            }
        ).catch(e => alert("Kamera Error."));
    }
</script>
</body>
</html>
