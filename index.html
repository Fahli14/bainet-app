<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sistem BaiNet</title>
    <script src="https://unpkg.com/html5-qrcode"></script>
    <style>
        :root { --primary: #1a73e8; --success: #34a853; --bg: #f8f9fa; }
        * { box-sizing: border-box; margin: 0; padding: 0; font-family: 'Segoe UI', sans-serif; }
        body { background: var(--bg); display: flex; justify-content: center; min-height: 100vh; padding: 15px; }
        .card { background: white; width: 100%; max-width: 400px; border-radius: 15px; padding: 25px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); height: fit-content; }
        .header { text-align: center; margin-bottom: 20px; color: var(--primary); }
        input, button { width: 100%; padding: 12px; margin: 10px 0; border-radius: 10px; border: 1px solid #ddd; font-size: 16px; }
        button { background: var(--primary); color: white; border: none; font-weight: bold; cursor: pointer; transition: 0.3s; }
        button:disabled { background: #ccc; }
        .hidden { display: none; }
        .stats { display: flex; gap: 10px; margin-bottom: 20px; }
        .stat-item { flex: 1; background: #e8f0fe; padding: 10px; border-radius: 8px; text-align: center; }
        .stat-item b { color: var(--primary); display: block; font-size: 18px; }
        #reader { width: 100%; margin-top: 10px; border-radius: 10px; overflow: hidden; }
    </style>
</head>
<body>

<div class="card">
    <div class="header">
        <h1>Sistem BaiNet</h1>
        <p id="subStatus">Portal Reseller</p>
    </div>

    <!-- HALAMAN LOGIN -->
    <div id="loginPage">
        <label>Nama Reseller:</label>
        <input type="text" id="resellerName" placeholder="Ketik nama manual...">
        <label>Password:</label>
        <input type="password" id="passInput" maxlength="4" inputmode="numeric">
        <button onclick="prosesLogin()">LOGIN</button>
        <p id="err" style="color:red; text-align:center; font-size:14px; margin-top:10px;"></p>
    </div>

    <!-- HALAMAN DASHBOARD -->
    <div id="dashboardPage" class="hidden">
        <div class="stats">
            <div class="stat-item"><small>Sisa Stok</small><b id="stokVal">0</b></div>
            <div class="stat-item"><small>Saldo</small><b id="saldoVal">0</b></div>
        </div>
        
        <label>Input/Scan Kode Voucher:</label>
        <input type="text" id="voucherCode" placeholder="Kode otomatis terisi...">
        <button id="btnKirim" onclick="submitKeGoogle()">Kirim Laporan</button>
        <button style="background: var(--success);" onclick="mulaiScan()">📷 Scan Barcode</button>
        
        <div id="reader" class="hidden"></div>
        
        <button style="background:#666; margin-top:20px;" onclick="location.reload()">LOGOUT</button>
    </div>
</div>

<script>
    // URL APPSCRIPT ANDA
    const scriptURL = "https://script.google.com/macros/s/AKfycbxPTQm2R5QQlQ3u473Z1XUxGEr4t0NOFg9vAu-TuCwMvFHL0EvtMGm6ej2h-ydIZOabXg/exec";

    // DATABASE RESELLER
    const db = {
        "Mastin": { p: "1111", s: 50, sal: 150000 },
        "Yesi": { p: "2222", s: 30, sal: 75000 },
        "Qila": { p: "3333", s: 100, sal: 500000 },
        "Santy": { p: "4444", s: 25, sal: 40000 },
        "Upi": { p: "5555", s: 40, sal: 90000 },
        "Tity": { p: "6666", s: 60, sal: 120000 }
    };

    let userSekarang = "";

    function prosesLogin() {
        const n = document.getElementById('resellerName').value.trim();
        const p = document.getElementById('passInput').value;
        
        // Cari nama tanpa peduli huruf besar/kecil
        const namaKey = Object.keys(db).find(k => k.toLowerCase() === n.toLowerCase());

        if (namaKey && db[namaKey].p === p) {
            userSekarang = namaKey;
            document.getElementById('loginPage').classList.add('hidden');
            document.getElementById('dashboardPage').classList.remove('hidden');
            document.getElementById('subStatus').innerText = "Halo, " + namaKey;
            document.getElementById('stokVal').innerText = db[namaKey].s;
            document.getElementById('saldoVal').innerText = "Rp" + db[namaKey].sal.toLocaleString();
        } else {
            document.getElementById('err').innerText = "Nama atau Password Salah!";
        }
    }

    function submitKeGoogle() {
        const kode = document.getElementById('voucherCode').value;
        const btn = document.getElementById('btnKirim');
        if(!kode) return alert("Scan voucher dulu!");

        btn.disabled = true;
        btn.innerText = "Mengirim...";

        fetch(scriptURL, {
            method: 'POST',
            mode: 'no-cors', // Penting untuk Apps Script
            cache: 'no-cache',
            body: JSON.stringify({ nama: userSekarang, kode: kode })
        })
        .then(() => {
            db[userSekarang].s--;
            document.getElementById('stokVal').innerText = db[userSekarang].s;
            document.getElementById('voucherCode').value = "";
            btn.disabled = false;
            btn.innerText = "Kirim Laporan";
            alert("Berhasil! Data " + kode + " sudah masuk ke Google Sheets.");
        })
        .catch(e => {
            alert("Error kirim data!");
            btn.disabled = false;
            btn.innerText = "Kirim Laporan";
        });
    }

    function mulaiScan() {
        const r = document.getElementById('reader');
        r.classList.remove('hidden');
        const scanner = new Html5Qrcode("reader");
        scanner.start({ facingMode: "environment" }, { fps: 10, qrbox: 250 }, 
            hasil => {
                document.getElementById('voucherCode').value = hasil;
                scanner.stop();
                r.classList.add('hidden');
                submitKeGoogle();
            }
        ).catch(e => alert("Kamera tidak diizinkan atau tidak ditemukan."));
    }
</script>

</body>
</html>
